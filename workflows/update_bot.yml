name: Tự động cập nhật Tỷ số World Cup

on:
  schedule:
    # Chạy 1 lần/ngày vào lúc 01:00 UTC (tương đương 8:00 sáng giờ Việt Nam)
    - cron: '0 1 * * *'  
  workflow_dispatch:        # Vẫn giữ nguyên dòng này để bạn có thể bấm chạy thủ công bằng tay bất cứ lúc nào

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v3

      - name: Cài đặt Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cài đặt thư viện
        run: pip install -r requirements.txt

      - name: Chạy Bot Cập Nhật
        env:
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
        run: python bot_update.py
